<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spice Garden — Kitchen Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #C8410B;
      --gold: #F5A623;
      --dark: #1A0A00;
      --bg: #0f0f0f;
      --card: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --pending: #F5A623;
      --preparing: #3b82f6;
      --ready: #22c55e;
      --served: #6b7280;
      --cancelled: #ef4444;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; }

    /* ── Login ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #1A0A00, #2D1200);
    }
    .login-box {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      border: 1px solid rgba(245,166,35,0.15);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .login-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); text-align: center; margin-bottom: 6px; }
    .login-sub { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 32px; }
    .login-box label { display: block; font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
    .login-box input {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 14px; color: #fff; font-size: 0.95rem; margin-bottom: 16px;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; background: var(--primary); color: #fff; border: none; border-radius: 12px;
      padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: background 0.15s; margin-top: 4px;
    }
    .login-btn:hover { background: #a33408; }
    .login-error { color: #ef4444; font-size: 0.82rem; margin-top: 10px; text-align: center; display: none; }

    /* ── KDS ── */
    #kds-screen { display: none; }
    header {
      background: #111;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.1rem; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .staff-name { font-size: 0.82rem; color: rgba(255,255,255,0.5); }
    .logout-btn {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: rgba(255,255,255,0.6);
      border-radius: 8px; padding: 6px 14px; font-size: 0.78rem; cursor: pointer; font-family: 'Inter', sans-serif;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.1); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 24px 0;
      border-bottom: 1px solid var(--border);
      background: #111;
    }
    .tab {
      padding: 10px 20px;
      border-radius: 8px 8px 0 0;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      border: 1px solid transparent;
      border-bottom: none;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .tab.active { background: var(--bg); color: #fff; border-color: var(--border); }
    .tab-count {
      background: var(--primary);
      color: #fff;
      border-radius: 100px;
      padding: 1px 7px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    /* ── Orders grid ── */
    .orders-container { padding: 24px; }
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 24px;
      color: rgba(255,255,255,0.2);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Order card ── */
    .order-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.15s;
    }
    .order-card:hover { transform: translateY(-2px); }
    .order-card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .order-table { font-size: 1rem; font-weight: 700; color: #fff; }
    .order-id-small { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .status-badge {
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .status-badge.pending   { background: rgba(245,166,35,0.15); color: var(--pending); }
    .status-badge.preparing { background: rgba(59,130,246,0.15); color: var(--preparing); }
    .status-badge.ready     { background: rgba(34,197,94,0.15);  color: var(--ready); }
    .status-badge.served    { background: rgba(107,114,128,0.15); color: var(--served); }
    .status-badge.cancelled { background: rgba(239,68,68,0.15);  color: var(--cancelled); }

    .order-card-body { padding: 14px 16px; }
    .order-items { list-style: none; margin-bottom: 12px; }
    .order-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.8);
    }
    .order-item:last-child { border-bottom: none; }
    .order-item-qty { color: rgba(255,255,255,0.35); font-size: 0.78rem; }
    .order-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      margin-bottom: 14px;
    }
    .order-time { color: var(--gold); }

    /* ── Action buttons ── */
    .order-actions { display: flex; gap: 8px; }
    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .action-btn.preparing { background: rgba(59,130,246,0.15); color: var(--preparing); border: 1px solid rgba(59,130,246,0.3); }
    .action-btn.preparing:hover { background: #3b82f6; color: #fff; }
    .action-btn.ready     { background: rgba(34,197,94,0.15);  color: var(--ready);     border: 1px solid rgba(34,197,94,0.3); }
    .action-btn.ready:hover { background: #22c55e; color: #fff; }
    .action-btn.served    { background: rgba(107,114,128,0.15); color: var(--served);   border: 1px solid rgba(107,114,128,0.3); }
    .action-btn.served:hover { background: #6b7280; color: #fff; }
    .action-btn.cancel    { background: rgba(239,68,68,0.1);   color: var(--cancelled); border: 1px solid rgba(239,68,68,0.2); }
    .action-btn.cancel:hover { background: #ef4444; color: #fff; }
    .action-btn.close-card { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); flex: 1; }
    .action-btn.close-card:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Confirm dialog ── */
    .confirm-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 400;
      align-items: center; justify-content: center; padding: 24px;
    }
    .confirm-backdrop.show { display: flex; }
    .confirm-box {
      background: #1e1e1e; border-radius: 16px; padding: 28px 24px;
      max-width: 340px; width: 100%;
      border: 1px solid rgba(239,68,68,0.3);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      text-align: center;
    }
    .confirm-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .confirm-title { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .confirm-msg { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-bottom: 22px; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button { flex: 1; padding: 11px; border-radius: 10px; border: none; font-size: 0.88rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
    .confirm-yes { background: #ef4444; color: #fff; }
    .confirm-yes:hover { background: #dc2626; }
    .confirm-no { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }
    .confirm-no:hover { background: rgba(255,255,255,0.14); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #222; color: #fff; padding: 10px 20px;
      border-radius: 100px; font-size: 0.85rem; opacity: 0;
      transition: all 0.3s; z-index: 300; white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🪔 Spice Garden</div>
    <div class="login-sub">Kitchen Display System</div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="kitchen@tableqr.com" value="kitchen@tableqr.com" />
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" value="kitchen1234" />
    <button class="login-btn" onclick="login()">Sign In →</button>
    <div class="login-error" id="login-error">Invalid credentials. Please try again.</div>
  </div>
</div>

<!-- KDS -->
<div id="kds-screen">
  <header>
    <div class="header-logo">🪔 Kitchen Display</div>
    <div class="header-right">
      <span class="staff-name" id="staff-name"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" id="tab-active" onclick="switchTab('active')">
      🔥 Active <span class="tab-count" id="count-active">0</span>
    </div>
    <div class="tab" id="tab-all" onclick="switchTab('all')">
      📋 All Orders <span class="tab-count" id="count-all">0</span>
    </div>
  </div>

  <div class="orders-container">
    <div class="orders-grid" id="orders-grid">
      <div class="empty-state">
        <div class="empty-icon">🍳</div>
        <p>Loading orders…</p>
      </div>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div class="confirm-backdrop" id="confirm-backdrop">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirm-msg">This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-no" onclick="closeConfirm()">No, Keep It</button>
      <button class="confirm-yes" id="confirm-yes-btn">Yes, Cancel Order</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let token = localStorage.getItem('kds_token');
  let currentUser = null;
  let socket = null;
  let currentTab = 'active';
  let allOrders = [];

  // ── Auto-login if token exists ─────────────────────────────────────────────
  if (token) {
    verifyAndShow();
  }

  async function verifyAndShow() {
    try {
      const res = await fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) throw new Error('invalid');
      currentUser = await res.json();
      showKDS();
    } catch {
      token = null;
      localStorage.removeItem('kds_token');
    }
  }

  async function login() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      if (!res.ok) { errEl.style.display = 'block'; return; }
      const data = await res.json();
      token = data.token;
      currentUser = data.user;
      localStorage.setItem('kds_token', token);
      showKDS();
    } catch {
      errEl.style.display = 'block';
    }
  }

  function logout() {
    token = null;
    currentUser = null;
    localStorage.removeItem('kds_token');
    if (socket) socket.disconnect();
    document.getElementById('kds-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  function showKDS() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('kds-screen').style.display = 'block';
    document.getElementById('staff-name').textContent = currentUser.name + ' (' + currentUser.role + ')';
    connectSocket();
    loadOrders();
    // Auto-refresh every 30s
    setInterval(loadOrders, 30000);
  }

  // ── Socket ─────────────────────────────────────────────────────────────────
  function connectSocket() {
    socket = io();
    socket.on('connect', () => {
      socket.emit('join:kitchen', { token });
    });
    socket.on('kitchen:new-order', (order) => {
      showToast('New order: Table ' + order.tableNumber);
      loadOrders();
    });
    socket.on('kitchen:order-updated', () => {
      loadOrders();
    });
    socket.on('auth:error', () => {
      showToast('Socket auth failed. Please re-login.');
    });
  }

  // ── Load orders ────────────────────────────────────────────────────────────
  async function loadOrders() {
    try {
      const url = currentTab === 'active' ? '/api/orders/active' : '/api/orders';
      const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) throw new Error('Failed');
      allOrders = await res.json();
      renderOrders(allOrders);
      updateCounts();
    } catch (e) {
      showToast('Failed to load orders');
    }
  }

  async function updateCounts() {
    try {
      const [activeRes, allRes] = await Promise.all([
        fetch('/api/orders/active', { headers: { Authorization: 'Bearer ' + token } }),
        fetch('/api/orders', { headers: { Authorization: 'Bearer ' + token } }),
      ]);
      const active = await activeRes.json();
      const all = await allRes.json();
      document.getElementById('count-active').textContent = active.length;
      document.getElementById('count-all').textContent = all.length;
    } catch {}
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-active').classList.toggle('active', tab === 'active');
    document.getElementById('tab-all').classList.toggle('active', tab === 'all');
    loadOrders();
  }

  // ── Render orders ──────────────────────────────────────────────────────────
  function renderOrders(orders) {
    const grid = document.getElementById('orders-grid');
    if (!orders.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><p>No orders here</p></div>`;
      return;
    }
    grid.innerHTML = '';
    // Sort: pending first, then preparing, then ready
    const priority = { pending: 0, preparing: 1, ready: 2, served: 3, cancelled: 4 };
    const sorted = [...orders].sort((a, b) => (priority[a.status] || 0) - (priority[b.status] || 0));
    sorted.forEach(order => grid.appendChild(buildCard(order)));
  }

  function buildCard(order) {
    const card = document.createElement('div');
    card.className = 'order-card';
    card.id = 'order-' + order._id;

    const timeAgo = getTimeAgo(new Date(order.createdAt));
    const items = (order.items || []).map(i =>
      `<li class="order-item"><span>${escHtml(i.name || 'Item')}</span><span class="order-item-qty">× ${i.quantity}</span></li>`
    ).join('');

    const actions = getActions(order);

    card.innerHTML = `
      <div class="order-card-header">
        <div>
          <div class="order-table">🪑 Table ${order.tableNumber}</div>
          <div class="order-id-small">${order.orderId || order._id}</div>
        </div>
        <span class="status-badge ${order.status}">${order.status}</span>
      </div>
      <div class="order-card-body">
        <ul class="order-items">${items}</ul>
        <div class="order-meta">
          <span class="order-time">⏱ ${timeAgo}</span>
          <span>₹${(order.total || 0).toFixed(2)}</span>
        </div>
        <div class="order-actions">${actions}</div>
      </div>
    `;
    return card;
  }

  function getActions(order) {
    const s = order.status;
    const id = order._id;
    if (s === 'pending') return `
      <button class="action-btn preparing" onclick="updateStatus('${id}','preparing')">👨‍🍳 Start Preparing</button>
      <button class="action-btn cancel" onclick="confirmCancel('${id}')">✕ Cancel</button>
    `;
    if (s === 'preparing') return `
      <button class="action-btn ready" onclick="updateStatus('${id}','ready')">✅ Mark Ready</button>
      <button class="action-btn cancel" onclick="confirmCancel('${id}')">✕ Cancel</button>
    `;
    if (s === 'ready') return `
      <button class="action-btn served" onclick="updateStatus('${id}','served')">🍽️ Mark Served</button>
      <button class="action-btn cancel" onclick="confirmCancel('${id}')">✕ Cancel</button>
    `;
    if (s === 'served' || s === 'cancelled') return `
      <button class="action-btn close-card" onclick="closeCard('${id}')">✕ Close</button>
    `;
    return '';
  }

  function confirmCancel(orderId) {
    showConfirm('Cancel this order?', 'This cannot be undone.', () => updateStatus(orderId, 'cancelled'));
  }

  function closeCard(orderId) {
    const card = document.getElementById('order-' + orderId);
    if (card) {
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.9)';
      setTimeout(() => card.remove(), 300);
    }
  }

  // ── Confirm dialog ────────────────────────────────────────────────────────
  let _confirmCallback = null;
  function showConfirm(title, msg, onYes) {
    _confirmCallback = onYes;
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    document.getElementById('confirm-backdrop').classList.add('show');
    document.getElementById('confirm-yes-btn').onclick = () => { closeConfirm(); onYes(); };
  }
  function closeConfirm() {
    document.getElementById('confirm-backdrop').classList.remove('show');
    _confirmCallback = null;
  }

  // ── Update status ──────────────────────────────────────────────────────────
  async function updateStatus(orderId, newStatus) {
    try {
      const res = await fetch('/api/orders/' + orderId + '/status', {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + token,
        },
        body: JSON.stringify({ status: newStatus }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        showToast(data.error || 'Failed to update');
        return;
      }
      showToast('Order marked as ' + newStatus);
      loadOrders();
    } catch {
      showToast('Network error');
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function getTimeAgo(date) {
    const diff = Math.floor((Date.now() - date) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Enter key on login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
  });
</script>
</body>
</html>
